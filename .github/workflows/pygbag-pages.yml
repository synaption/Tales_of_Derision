name: Deploy Pygbag to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pygbag esper

      - name: Build web bundle
        run: bash scripts/build_pygbag.sh

      - name: Configure Pages
        id: configure_pages
        continue-on-error: true
        uses: actions/configure-pages@v6

      - name: Configure Pages (auto-enable)
        id: configure_pages_enable
        if: ${{ steps.configure_pages.outcome == 'failure' }}
        continue-on-error: true
        uses: actions/configure-pages@v6
        with:
          token: ${{ secrets.PAGES_ADMIN_TOKEN }}
          enablement: true

      - name: Fail with setup guidance
        if: ${{ steps.configure_pages.outcome == 'failure' && steps.configure_pages_enable.outcome != 'success' }}
        run: |
          echo "GitHub Pages is not enabled for this repository."
          echo "Enable it in Settings > Pages and set Source to GitHub Actions,"
          echo "or add repository secret PAGES_ADMIN_TOKEN to let this workflow auto-enable Pages."
          echo "PAGES_ADMIN_TOKEN should be a PAT with repo and pages administration/write permissions."
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5